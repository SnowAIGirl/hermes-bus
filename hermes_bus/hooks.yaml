# Hook scripts list
# Each script executes asynchronously in order after every message route.
# Each script reads the full message JSON from stdin.
#
# Override via environment variable (higher priority):
#   export HERMES_BUS_HOOKS="/path/to/hook1.py,/path/to/hook2.py"
#   Set to "none" to disable all hooks.

- ~/.hermes/hermes-notify/bus_callback.py  # default; users should customize
